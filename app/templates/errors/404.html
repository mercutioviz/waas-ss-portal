{% extends "base.html" %}
{% block title %}Page Not Found - WaaS Portal{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center mt-5">
    <div class="card text-center" style="max-width: 500px; width: 100%;">
        <div class="card-body py-5">
            <i class="bi bi-question-circle display-1 text-warning"></i>
            <h2 class="mt-3">Page Not Found</h2>
            <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary mt-2">
                <i class="bi bi-speedometer2"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
