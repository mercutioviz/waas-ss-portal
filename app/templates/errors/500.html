{% extends "base.html" %}
{% block title %}Server Error - WaaS Portal{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center mt-5">
    <div class="card text-center" style="max-width: 500px; width: 100%;">
        <div class="card-body py-5">
            <i class="bi bi-exclamation-octagon display-1 text-danger"></i>
            <h2 class="mt-3">Server Error</h2>
            <p class="text-muted">Something went wrong on our end. Please try again later.</p>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary mt-2">
                <i class="bi bi-speedometer2"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
