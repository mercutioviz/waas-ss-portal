{% extends "base.html" %}
{% block title %}{{ _('Too Many Requests') }} - WaaS Portal{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center mt-5">
    <div class="card text-center" style="max-width: 500px; width: 100%;">
        <div class="card-body py-5">
            <i class="bi bi-hourglass-split display-1 text-warning"></i>
            <h2 class="mt-3">{{ _('Too Many Requests') }}</h2>
            <p class="text-muted">{{ _("You've made too many requests in a short period. Please wait a moment and try again.") }}</p>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary mt-2">
                <i class="bi bi-speedometer2"></i> {{ _('Back to Dashboard') }}
            </a>
        </div>
    </div>
</div>
{% endblock %}
